<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            border: 1px solid black;
            width: 50%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            margin: auto;
            margin-top: 20px;
            box-shadow: rgb(85, 91, 255) 0px 0px 0px 3px, rgb(31, 193, 27) 0px 0px 0px 6px, rgb(255, 217, 19) 0px 0px 0px 9px, rgb(255, 156, 85) 0px 0px 0px 12px, rgb(255, 85, 85) 0px 0px 0px 15px;
        }
        .child{
            justify-content: center;
            align-items: center;
            display: flex;
            border: 2px solid none;
            border-radius: 20px;
            width: 150px;
            height: 150px;
            margin: 10px;
            background-color: rgb(137, 176, 63);
            box-shadow: rgba(0, 0, 0, 0.17) 0px -23px 25px 0px inset, rgba(0, 0, 0, 0.15) 0px -36px 30px 0px inset, rgba(0, 0, 0, 0.1) 0px -79px 40px 0px inset, rgba(0, 0, 0, 0.06) 0px 2px 1px, rgba(0, 0, 0, 0.09) 0px 4px 2px, rgba(0, 0, 0, 0.09) 0px 8px 4px, rgba(0, 0, 0, 0.09) 0px 16px 8px, rgba(0, 0, 0, 0.09) 0px 32px 16px;
        }
    </style>

</head>
<body>
    <h1 style = "text-align: center;">Flexbox</h1>
    <div id = "container">
        <div class = "child">Box 1</div>
        <div class = "child">Box 2</div>
        <div class = "child">Box 3</div>
        <div class = "child">Box 4</div>
        <div class = "child">Box 5</div>
        <div class = "child">Box 6</div>
        <div class = "child">Box 7</div>
        <div class = "child">Box 8</div>
        <div class = "child">Box 9</div>
        <div class = "child">Box 10</div>
    </div>
</body>
</html>
