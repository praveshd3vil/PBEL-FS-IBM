<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       body{
        background-color: #311b1b;
        justify-content: center;
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        height: 700px;
        font-family: Arial, sans-serif;
        flex-direction:column;
       }
       .keyboard {
        background-color: rgb(153, 111, 111);
        padding: 20px;
        border-radius: 20px;    
       }

       .row{
        display: flex;
        margin-bottom: 10px;
       }

       .key{
        width:50px;
        height:50px;
        background:white;
        border:2px solid #888;
        border-radius:30px;
        display:flex;
        justify-content:center;
        align-items:center;
        margin-right: 10px;
        box-shadow: rgba(255, 46, 46, 0.17) 0px -23px 25px 0px inset, rgba(11, 98, 248, 0.15) 0px -36px 30px 0px inset, rgba(159, 23, 232, 0.1) 0px -79px 40px 0px inset, rgba(232, 19, 136, 0.06) 0px 2px 1px, rgba(233, 147, 9, 0.09) 0px 4px 2px, rgba(0, 0, 0, 0.09) 0px 8px 4px, rgba(0, 0, 0, 0.09) 0px 16px 8px, rgba(0, 0, 0, 0.09) 0px 32px 16px;
       }
       .keyBackspace{
        width:120px;
        background:white;
        border:2px solid #888;
        display:flex;
        border-radius:25px;
        justify-content:center;
        align-items:center;  
        margin-right: 5px;  
       }
       .keyTab{
        width:90px;
        background:white;
        border:2px solid #888;
        display:flex;
        border-radius:25px;
         justify-content:center;
        align-items:center;  
         margin-right: 5px;  
       }
       .keyPageup{
        width:80px;
        background:white;
         display:flex;
        border:2px solid #888;
        border-radius:20px;
         justify-content:center;
        align-items:center;  
         margin-right: 5px;  
         box-shadow: 0 0 0 3px #168ae9;
       }
       .keyCapsLock{
        width:100px;
        background:white;
         display:flex;
        border:2px solid #888;
        border-radius:20px;
        justify-content:center;
        align-items:center; 
         margin-right: 5px;   
         box-shadow: 0 0 0 3px #FBBF24;
       }
       .keyEnter{
        width:120px;
        background:white;
        display:flex;
        border:2px solid #888;
        border-radius:20px;
        justify-content:center;
        align-items:center; 
        margin-right: 10px;  
        box-shadow: 0 0 0 3px #0ad92c; 
       }
    .keyPagedown{
        width:90px;
        background:white;
         display:flex;
        border:2px solid #888;
        border-radius:20px;
         justify-content:center;
        align-items:center;  
         margin-right: 2px;  
         box-shadow: 0 0 0 3px #3624fb;
       }
       .keyShift{
        width:135px;
        background:white;
         display:flex;
        border:2px solid #888;
        border-radius:20px;
         justify-content:center;
        align-items:center; 
         margin-right: 5px;   
         box-shadow: 0 0 0 3px #fb2424;
       }
       .keySpace{
        width:420px;
        background:white;
         display:flex;
        border:2px solid #888;
        border-radius:20px;
        justify-content:center;
        align-items:center;  
         margin-right: 10px;  
         box-shadow: 0 0 0 3px #2ffb24;
       }
       .keyDelete{
        width:80px;
        background:white;
         display:flex;
        border:2px solid #888;
        border-radius:20px;
         justify-content:center;
        align-items:center;  
         margin-right: 5px;  
         box-shadow: 0 0 0 3px #f30606;
       }
       .keyCtrl{
        width:80px;
        background:white;
         display:flex;
        border:2px solid #888;
        border-radius:20px;
         justify-content:center;
        align-items:center;  
         margin-right: 5px;
         box-shadow: 0 0 0 3px #dab10d;
       }

    </style>
</head>
